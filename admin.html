<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 - 근무일지 캘린더</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell admin-shell">
    <section class="toolbar" aria-label="관리자 메뉴">
      <div>
        <p class="eyebrow">Work Log Calendar</p>
        <h1>관리자</h1>
      </div>
      <div class="toolbar-actions">
        <a class="secondary link-button" href="/">캘린더</a>
        <form method="post" action="/logout" class="logout-form">
          <button type="submit" class="secondary">로그아웃</button>
        </form>
      </div>
    </section>

    <section class="admin-grid">
      <form id="userForm" class="summary-panel admin-card">
        <div class="panel-header">
          <h2>계정 만들기</h2>
        </div>
        <p id="userFormMessage" class="login-error hidden"></p>
        <label>
          아이디
          <input id="newUsername" type="text" autocomplete="off" required>
        </label>
        <label>
          비밀번호
          <input id="newPassword" type="password" autocomplete="new-password" required>
        </label>
        <label>
          이름
          <input id="newName" type="text" autocomplete="off" required>
        </label>
        <label>
          이메일
          <input id="newEmail" type="email" autocomplete="off" required>
        </label>
        <label>
          권한
          <select id="newRole">
            <option value="user">일반</option>
            <option value="admin">관리자</option>
          </select>
        </label>
        <button type="submit">계정 만들기</button>
      </form>

      <section class="summary-panel admin-card" aria-label="계정 목록">
        <div class="panel-header">
          <h2>계정 목록</h2>
        </div>
        <div id="userList" class="user-list"></div>
      </section>
    </section>
  </main>

  <div id="editUserModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="editUserModalTitle">
    <form id="editUserForm" class="modal-card">
      <div class="modal-header">
        <h2 id="editUserModalTitle">회원 수정</h2>
        <button id="closeEditUserModal" type="button" class="icon-button" aria-label="회원 수정 닫기">×</button>
      </div>
      <p id="editUserFormMessage" class="login-error hidden"></p>
      <input id="editUsername" type="hidden">
      <label>
        아이디
        <input id="editUsernameDisplay" type="text" disabled>
      </label>
      <label>
        새 비밀번호
        <input id="editPassword" type="password" autocomplete="new-password" placeholder="변경하지 않으려면 비워두세요">
      </label>
      <label>
        이름
        <input id="editName" type="text" autocomplete="off" required>
      </label>
      <label>
        이메일
        <input id="editEmail" type="email" autocomplete="off" required>
      </label>
      <label>
        권한
        <select id="editRole">
          <option value="user">일반</option>
          <option value="admin">관리자</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="button" class="secondary" data-edit-user-cancel>취소</button>
        <button type="submit">저장</button>
      </div>
    </form>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
