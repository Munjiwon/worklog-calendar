<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 - 근무일지 캘린더</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <form class="login-card" method="post" action="/register">
      <div>
        <p class="eyebrow">Work Log Calendar</p>
        <h1>회원가입</h1>
      </div>
      <p id="registerError" class="login-error hidden">입력값을 확인해주세요.</p>
      <label>
        아이디
        <input name="username" type="text" autocomplete="username" required autofocus>
      </label>
      <label>
        비밀번호
        <input name="password" type="password" autocomplete="new-password" required>
      </label>
      <label>
        이름
        <input name="name" type="text" autocomplete="name" required>
      </label>
      <label>
        이메일
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <button type="submit">회원가입</button>
      <p class="login-links">
        <a href="/login">로그인으로 돌아가기</a>
      </p>
    </form>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const messages = {
      duplicate_email: "이미 사용 중인 이메일입니다.",
      duplicate_username: "이미 존재하는 아이디입니다.",
      invalid_email: "이메일 형식을 확인해주세요.",
      invalid_name: "이름은 1-80자로 입력해주세요.",
      invalid_password: "비밀번호는 6자 이상으로 입력해주세요.",
      invalid_username: "아이디는 영문, 숫자, 점, 밑줄, 하이픈 3-40자로 입력해주세요."
    };
    const error = params.get("error");
    if (error) {
      const errorElement = document.querySelector("#registerError");
      errorElement.textContent = messages[error] || "입력값을 확인해주세요.";
      errorElement.classList.remove("hidden");
    }
  </script>
</body>
</html>
